name: Unzip File in Current Directory

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unzip_and_commit:
    runs-on: ubuntu-latest

    # রিপোজিটরিতে ফাইল লেখার পারমিশন
    permissions:
      contents: write

    steps:
      # ১. রিপোজিটরির ফাইল কোডে নিয়ে আসা
      - name: Checkout repository
        uses: actions/checkout@v4

      # ২. জিপ ফাইলটি ঠিক যেখানে আছে সেখানেই আনজিপ করা
      - name: Unzip rapidstore.zip in-place
        run: |
          unzip -o rapidstore.zip
          # (-o দেওয়ার কারণে যদি একই নামের ফাইল থাকে তবে সেটি অটোমেটিক ওভাররাইট হবে)

      # ৩. মূল জিপ ফাইলটি ডিলিট করা (একই জায়গায় আনজিপ করার পর জিপটি ডিলিট করে দেওয়া ভালো)
      - name: Remove zip file
        run: |
          rm rapidstore.zip

      # ৪. আনজিপ হওয়া সব ফাইল আপনার মূল রিপোজিটরিতে পুশ করা
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@://github.com"
          
          # বর্তমান ডিরেক্টরির সব নতুন ফাইল যোগ করা
          git add .
          
          # ফাইল পরিবর্তন হয়ে থাকলে কেবল তখনই কমিট ও পুশ করা
          git diff-index --quiet HEAD || git commit -m "Automated: Unzipped rapidstore.zip in current directory"
          git push
          
